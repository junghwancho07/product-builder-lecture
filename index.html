<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Generator</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>로또 번호 추천</h1>
      <button id="theme-toggle">테마 변경</button>
    </div>
    
    <div class="lotto-display" id="lotto-numbers">
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
    </div>

    <button id="generate-btn" class="main-btn">번호 생성하기</button>

    <div class="contact-section">
      <div class="divider"></div>
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/mzdkkjgq" method="POST">
        <input type="text" name="name" placeholder="성함 또는 업체명" required>
        <input type="email" name="_replyto" placeholder="이메일 주소" required>
        <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
        <button type="submit" class="submit-btn">문의하기</button>
      </form>
    </div>

    <div class="comments-section">
      <div class="divider"></div>
      <div id="disqus_thread"></div>
